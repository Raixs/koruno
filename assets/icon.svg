      <rect x="272" y="224" width="16" height="48" rx="5" fill="#c2410c" opacity="0.54"/>
      <rect x="304" y="224" width="16" height="48" rx="5" fill="#c2410c" opacity="0.54"/>

      <rect x="192" y="304" width="16" height="48" rx="5" fill="#f97316"/>
