<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" role="img" aria-labelledby="title desc">
  <title id="title">Trivial Koruño</title>
  <desc id="desc">Icono plano inspirado en la Torre de Hércules.</desc>
  <defs>
    <clipPath id="app-clip">
      <rect width="512" height="512" rx="112"/>
    </clipPath>

    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="0.58" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>

    <linearGradient id="tower" x1="176" y1="96" x2="336" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fdba74"/>
